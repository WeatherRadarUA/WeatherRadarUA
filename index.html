<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Погода Україна</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body {
      margin: 0;
      font-family: system-ui, Roboto, Arial, sans-serif;
      background: #070d1a;
      color: #eef5ff;
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .panel {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      width: min(430px, calc(100vw - 20px));
      max-height: calc(100vh - 20px);
      overflow: auto;
      padding: 14px;
      border-radius: 20px;
      background: rgba(8, 15, 30, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .sub {
      opacity: 0.75;
      font-size: 14px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 16px;
    }

    .sug {
      margin-top: 8px;
      max-height: 220px;
      overflow: auto;
    }

    .item {
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
    }

    .item:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .item small {
      display: block;
      opacity: 0.7;
    }

    .cur {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(
        135deg,
        rgba(37, 99, 235, 0.25),
        rgba(14, 165, 233, 0.16)
      );
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .icon {
      font-size: 52px;
      animation: floatIcon 3s ease-in-out infinite;
    }

    @keyframes floatIcon {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    .temp {
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .card {
      padding: 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 14px;
    }

    .card b {
      display: block;
      margin-top: 4px;
    }

    .hours {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 8px;
      margin-top: 8px;
    }

    .hour {
      min-width: 74px;
      text-align: center;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
    }

    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      color: white;
      background: #2563eb;
      font-weight: 600;
      font-size: 15px;
    }

    button.sec {
      background: rgba(255, 255, 255, 0.12);
    }

    .small {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.65;
    }

    .status,
    .error {
      margin-top: 10px;
    }

    .error {
      color: #ffb4b4;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <div class="panel">
    <h1>🇺🇦 Погода Україна</h1>
    <div class="sub">Карта, погода, прогноз на 24 години, радар</div>

    <input id="q" placeholder="Пошук: Київ, Львів, село...">

    <div id="sug" class="sug"></div>

    <div id="w"></div>

    <div class="btns">
      <button id="radar" class="sec">Увімкнути радар</button>
      <button id="geo" class="sec">Моє місце</button>
    </div>

    <div id="rt" class="small"></div>

    <div class="small">
      Погода: Open-Meteo • Карта: OpenStreetMap • Радар: RainViewer
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>

  <script>
    const map = L.map("map", {
      minZoom: 6,
      maxBounds: L.latLngBounds([44, 21.5], [52.6, 40.5]).pad(0.2)
    }).setView([48.8, 31.5], 6);

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const q = document.getElementById("q");
    const sug = document.getElementById("sug");
    const w = document.getElementById("w");
    const rt = document.getElementById("rt");
    const radarBtn = document.getElementById("radar");
    const geoBtn = document.getElementById("geo");

    let last = [];
    let marker = null;
    let radarLayers = [];
    let radarTimer = null;
    let radarOn = false;
    let deb = null;
    let fuse = null;
    let cache = new Map();

    const codes = {
      0: ["☀️", "Ясно"],
      1: ["🌤️", "Переважно ясно"],
      2: ["⛅", "Мінлива хмарність"],
      3: ["☁️", "Хмарно"],
      45: ["🌫️", "Туман"],
      48: ["🌫️", "Паморозь"],
      51: ["🌦️", "Мряка"],
      53: ["🌦️", "Мряка"],
      55: ["🌧️", "Сильна мряка"],
      56: ["🌧️", "Крижана мряка"],
      57: ["🌧️", "Сильна крижана мряка"],
      61: ["🌧️", "Невеликий дощ"],
      63: ["🌧️", "Дощ"],
      65: ["🌧️", "Сильний дощ"],
      66: ["🌧️", "Крижаний дощ"],
      67: ["🌧️", "Сильний крижаний дощ"],
      71: ["🌨️", "Невеликий сніг"],
      73: ["🌨️", "Сніг"],
      75: ["❄️", "Сильний сніг"],
      77: ["🌨️", "Снігові зерна"],
      80: ["🌦️", "Зливи"],
      81: ["🌧️", "Зливи"],
      82: ["⛈️", "Сильні зливи"],
      85: ["🌨️", "Снігопади"],
      86: ["❄️", "Сильні снігопади"],
      95: ["⛈️", "Гроза"],
      96: ["⛈️", "Гроза з градом"],
      99: ["⛈️", "Сильна гроза з градом"]
    };

    function esc(text) {
      return String(text ?? "").replace(/[&<>"']/g, function (m) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[m];
      });
    }

    function wi(code) {
      return codes[code] || ["🌡️", "Погода"];
    }

    function wd(deg) {
      const dirs = ["Пн", "ПнСх", "Сх", "ПдСх", "Пд", "ПдЗх", "Зх", "ПнЗх"];
      return dirs[Math.round(deg / 45) % 8];
    }

    async function get(url) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      try {
        const response = await fetch(url, {
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        return await response.json();
      } finally {
        clearTimeout(timeout);
      }
    }

    async function initLocal() {
      try {
        const response = await fetch("ua_places.json", {
          cache: "no-store"
        });

        if (!response.ok) {
          return;
        }

        const places = await response.json();

        if (window.Fuse && Array.isArray(places)) {
          fuse = new Fuse(places, {
            keys: ["name", "region"],
            threshold: 0.35
          });

          console.info("Локальний список місць завантажено:", places.length);
        }
      } catch (error) {
        console.info("Файл ua_places.json не знайдено. Працює онлайн-пошук.");
      }
    }

    initLocal();

    function isUkraine(place) {
      if (place.country_code) {
        return place.country_code === "UA";
      }

      const country = String(place.country || "").toLowerCase();
      return country.includes("ukraine") || country.includes("україн");
    }

    async function searchPlaces(query) {
      if (fuse) {
        const localResults = fuse
          .search(query, { limit: 12 })
          .map(result => result.item);

        if (localResults.length > 0) {
          return localResults.map(place => {
            return {
              name: place.name,
              latitude: place.lat,
              longitude: place.lon,
              admin1: place.region || "",
              feature_code: place.type || "",
              country_code: "UA"
            };
          });
        }
      }

      const url =
        "https://geocoding-api.open-meteo.com/v1/search?name=" +
        encodeURIComponent(query) +
        "&count=12&language=uk&format=json";

      const data = await get(url);

      return (data.results || []).filter(isUkraine);
    }

    q.addEventListener("input", function () {
      clearTimeout(deb);

      deb = setTimeout(async function () {
        const query = q.value.trim();

        if (query.length < 2) {
          sug.innerHTML = "";
          last = [];
          return;
        }

        try {
          last = await searchPlaces(query);

          if (!last.length) {
            sug.innerHTML = `<div class="item">Нічого не знайдено</div>`;
            return;
          }

          sug.innerHTML = last
            .map(function (place, index) {
              const admin = place.admin1 ? ", " + esc(place.admin1) : "";
              const type = place.feature_code
                ? " • " + esc(place.feature_code)
                : "";

              return `
                <div class="item" data-i="${index}">
                  ${esc(place.name)}${admin}
                  <small>
                    ${Number(place.latitude).toFixed(4)},
                    ${Number(place.longitude).toFixed(4)}${type}
                  </small>
                </div>
              `;
            })
            .join("");
        } catch (error) {
          sug.innerHTML = `<div class="item">Помилка пошуку</div>`;
        }
      }, 300);
    });

    sug.addEventListener("click", function (event) {
      const item = event.target.closest(".item");

      if (!item) {
        return;
      }

      const place = last[Number(item.dataset.i)];

      if (place) {
        selectPlace(place);
      }
    });

    function selectPlace(place) {
      sug.innerHTML = "";
      q.value = place.name;

      const lat = Number(place.latitude);
      const lon = Number(place.longitude);

      map.flyTo([lat, lon], 11, {
        duration: 1.2
      });

      if (marker) {
        map.removeLayer(marker);
      }

      marker = L.marker([lat, lon]).addTo(map);
      marker.bindPopup("<b>" + esc(place.name) + "</b>").openPopup();

      loadWeather(lat, lon, place.name);
    }

    async function loadWeather(lat, lon, name) {
      const key = lat.toFixed(3) + "," + lon.toFixed(3);
      const now = Date.now();
      const cached = cache.get(key);

      if (cached && now - cached.time < 600000) {
        renderWeather(cached.data, name);
        return;
      }

      w.innerHTML = `<div class="status">Завантаження погоди...</div>`;

      const url =
        "https://api.open-meteo.com/v1/forecast?latitude=" +
        lat +
        "&longitude=" +
        lon +
        "&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m" +
        "&hourly=temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m" +
        "&timezone=auto&forecast_days=2";

      try {
        const data = await get(url);

        cache.set(key, {
          time: now,
          data: data
        });

        renderWeather(data, name);
      } catch (error) {
        w.innerHTML = `<div class="error">Не вдалося завантажити погоду</div>`;
      }
    }

    function renderWeather(data, name) {
      const current = data.current;
      const [icon, text] = wi(current.weather_code);

      setBackground(current.weather_code);

      const hoursHtml = data.hourly.time
        .slice(0, 24)
        .map(function (time, index) {
          const [hourIcon] = wi(data.hourly.weather_code[index]);
          const temp = Math.round(data.hourly.temperature_2m[index]);
          const pop = data.hourly.precipitation_probability?.[index] ?? 0;

          const hour =
            new Date(time)
              .getHours()
              .toString()
              .padStart(2, "0") + ":00";

          return `
            <div class="hour">
              <div>${hour}</div>
              <div>${hourIcon}</div>
              <div><b>${temp}°</b></div>
              <div>💧${pop}%</div>
            </div>
          `;
        })
        .join("");

      w.innerHTML = `
        <div class="cur">
          <div class="icon">${icon}</div>
          <div>
            <div class="temp">${Math.round(current.temperature_2m)}°C</div>
            <div>${text}</div>
            <div class="small">${esc(name)}</div>
          </div>
        </div>

        <div class="grid">
          <div class="card">
            Відчувається
            <b>${Math.round(current.apparent_temperature)}°</b>
          </div>

          <div class="card">
            Вітер
            <b>
              ${Math.round(current.wind_speed_10m)} км/год
              ${wd(current.wind_direction_10m)}
            </b>
          </div>

          <div class="card">
            Вологість
            <b>${current.relative_humidity_2m}%</b>
          </div>

          <div class="card">
            Опади
            <b>${current.precipitation ?? 0} мм</b>
          </div>

          <div class="card">
            Широта
            <b>${data.latitude.toFixed(3)}</b>
          </div>

          <div class="card">
            Довгота
            <b>${data.longitude.toFixed(3)}</b>
          </div>
        </div>

        <div style="margin: 14px 0 8px;">Погодинний прогноз</div>

        <div class="hours">
          ${hoursHtml}
        </div>
      `;
    }

    function setBackground(code) {
      let background = "linear-gradient(135deg, #070d1a, #111827)";

      if ([0, 1].includes(code)) {
        background = "linear-gradient(135deg, #081226, #0e3a67)";
      } else if ([2, 3].includes(code)) {
        background = "linear-gradient(135deg, #111827, #374151)";
      } else if ([45, 48].includes(code)) {
        background = "linear-gradient(135deg, #111827, #4b5563)";
      } else if (
        [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)
      ) {
        background = "linear-gradient(135deg, #0f172a, #1e3a8a)";
      } else if ([71, 73, 75, 77, 85, 86].includes(code)) {
        background = "linear-gradient(135deg, #1e293b, #64748b)";
      } else if ([95, 96, 99].includes(code)) {
        background = "linear-gradient(135deg, #020617, #4c1d95)";
      }

      document.body.style.background = background;
    }

    function stopRadar() {
      clearInterval(radarTimer);

      radarLayers.forEach(function (layer) {
        map.removeLayer(layer);
      });

      radarLayers = [];
      rt.textContent = "";
    }

    async function loadRadar() {
      try {
        stopRadar();

        const data = await get(
          "https://api.rainviewer.com/public/weather-maps.json"
        );

        const frames = data?.radar?.past || [];

        if (!frames.length) {
          rt.textContent = "Радар тимчасово недоступний.";
          return;
        }

        frames.forEach(function (frame) {
          const layer = L.tileLayer(
            data.host + frame.path + "/256/{z}/{x}/{y}/2/1_1.png",
            {
              opacity: 0,
              attribution: "Radar © RainViewer"
            }
          );

          layer.addTo(map);
          radarLayers.push(layer);
        });

        let frameIndex = 0;

        radarTimer = setInterval(function () {
          radarLayers.forEach(function (layer, index) {
            layer.setOpacity(index === frameIndex ? 0.65 : 0);
          });

          const frame = frames[frameIndex];

          rt.textContent =
            "Радар: " +
            new Date(frame.time * 1000).toLocaleTimeString("uk-UA");

          frameIndex = (frameIndex + 1) % radarLayers.length;
        }, 700);
      } catch (error) {
        rt.textContent = "Не вдалося завантажити радар.";
      }
    }

    radarBtn.addEventListener("click", async function () {
      radarOn = !radarOn;

      if (radarOn) {
        radarBtn.textContent = "Вимкнути радар";
        await loadRadar();
      } else {
        radarBtn.textContent = "Увімкнути радар";
        stopRadar();
      }
    });

    geoBtn.addEventListener("click", function () {
      if (!navigator.geolocation) {
        alert("Геолокація недоступна.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          selectPlace({
            name: "Моє місце",
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
          });
        },
        function () {
          alert("Не вдалося отримати геолокацію.");
        }
      );
    });

    selectPlace({
      name: "Київ",
      latitude: 50.4501,
      longitude: 30.5234
    });
  </script>
</body>
  </html>
